name: Viral Shorts Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      geo:
        description: 'Google Trends country code (US, IN, GB...)'
        required: false
        default: 'US'
      max_clips:
        description: 'Max clips to process (1-10)'
        required: false
        default: '5'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install yt-dlp
        run: |
          pip install -U yt-dlp
          yt-dlp --version

      - name: Create output directories
        run: mkdir -p output/clips output/transcripts output/final

      - name: Run Viral Shorts Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          PIPELINE_GEO: ${{ github.event.inputs.geo || 'US' }}
          PIPELINE_MAX_CLIPS: ${{ github.event.inputs.max_clips || '5' }}
        run: python main.py

      - name: Upload output videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-clips-${{ github.run_number }}
          path: |
            output/final/*.mp4
            output/final/*.txt
            output/run_log_*.json
          retention-days: 7
          if-no-files-found: warn

      - name: Print run summary
        if: always()
        run: |
          echo "=== OUTPUT FILES ==="
          ls -lh output/final/ 2>/dev/null || echo "No final outputs found"
