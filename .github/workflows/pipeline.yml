name: Viral Shorts Pipeline

on:
  schedule:
    # Run every day at 9:00 AM UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      geo:
        description: 'Google Trends country code (US, IN, GB...)'
        required: false
        default: 'US'
      max_clips:
        description: 'Max clips to process (1-10)'
        required: false
        default: '5'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install system dependencies ────────────────────────────────────
      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1
          echo "✓ FFmpeg installed"

      # ── Setup Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Install Python dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "✓ Python dependencies installed"

      # ── Install yt-dlp (latest) ────────────────────────────────────────
      - name: Install yt-dlp
        run: |
          pip install -U yt-dlp
          yt-dlp --version
          echo "✓ yt-dlp installed"

      # ── Create output directories ──────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p output/clips output/transcripts output/final
          echo "✓ Output directories ready"

      # ── Run the pipeline ───────────────────────────────────────────────
      - name: Run Viral Shorts Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          PIPELINE_GEO: ${{ github.event.inputs.geo || 'US' }}
          PIPELINE_MAX_CLIPS: ${{ github.event.inputs.max_clips || '5' }}
        run: |
          echo "Starting pipeline for GEO=$PIPELINE_GEO, MAX_CLIPS=$PIPELINE_MAX_CLIPS"
          python main.py

      # ── Upload output videos as artifacts ─────────────────────────────
      - name: Upload output videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viral-clips-${{ github.run_number }}
          path: |
            output/final/*.mp4
            output/final/*.txt
            output/run_log_*.json
          retention-days: 7
          if-no-files-found: warn

      # ── Print summary ──────────────────────────────────────────────────
      - name: Print run summary
        if: always()
        run: |
          echo "=== OUTPUT FILES ==="
          ls -lh output/final/ 2>/dev/null || echo "No final outputs found"
          echo ""
          echo "=== RUN LOGS ==="
          cat output/run_log_*.json 2>/dev/null | python3 -m json.tool || echo "No run log found"
